# Remote model rankings — public benchmark boards crosswalked against the
# cost-capped OpenRouter roster. Seeded from docs/remote-eval-crosswalk.md.
# The single-entry score tables below are SEEDS reflecting the documented
# winners; run `distill models rankings fetch` to populate full board tables,
# then `distill models rankings apply` to write per-role picks into config.yaml.

# Candidate pool: cost-capped OpenRouter roster (<= $8 / 1M output tokens).
roster:
  - z-ai/glm-5.2
  - deepseek/deepseek-v4-pro
  - qwen/qwen3.6-35b-a3b
  - google/gemini-2.5-flash-lite-preview-09-2025
  - xiaomi/mimo-v2.5
  - bytedance-seed/seed-2.0-mini
  - openai/gpt-5-nano
  - moonshotai/kimi-k2.6
  - google/gemma-4-31b-it
  - z-ai/glm-4.7-flash
  - amazon/nova-lite-v1
  - qwen/qwen3-embedding-8b

# Benchmark boards. lower_is_better=true means a smaller score ranks higher
# (e.g. hallucination rate). scores map an OpenRouter slug -> board score.
# render/model_col/score_col/aliases guide `distill models rankings fetch`.
boards:
  hhem:
    source_url: https://github.com/vectara/hallucination-leaderboard
    metric: hallucination_rate_pct
    lower_is_better: true
    render: false
    model_col: 0
    score_col: 1
    aliases:
      gemini-2.5-flash-lite: google/gemini-2.5-flash-lite-preview-09-2025
      deepseek-v4-pro: deepseek/deepseek-v4-pro
      gpt-5-nano: openai/gpt-5-nano
      kimi-k2.6: moonshotai/kimi-k2.6
      glm-4.7-flash: z-ai/glm-4.7-flash
      nova-lite-v1: amazon/nova-lite-v1
    scores:
      google/gemini-2.5-flash-lite-preview-09-2025: 3.3
  llm_stats_composite:
    source_url: https://llm-stats.com/leaderboards/open-llm-leaderboard
    metric: composite
    lower_is_better: false
    render: true
    model_col: 0
    score_col: 1
    aliases:
      glm-5.2: z-ai/glm-5.2
    scores:
      z-ai/glm-5.2: 1.0
  llm_stats_reasoning:
    source_url: https://llm-stats.com/leaderboards/open-llm-leaderboard
    metric: gpqa_diamond
    lower_is_better: false
    render: true
    model_col: 0
    score_col: 2
    aliases:
      deepseek-v4-pro: deepseek/deepseek-v4-pro
    scores:
      deepseek/deepseek-v4-pro: 90.1
  eqbench_cw:
    source_url: https://eqbench.com/creative_writing.html
    metric: creative_writing_elo
    lower_is_better: false
    render: true
    model_col: 0
    score_col: 1
    aliases:
      glm-5.2: z-ai/glm-5.2
    scores:
      z-ai/glm-5.2: 1.0
  judgemark:
    source_url: https://eqbench.com/judgemark.html
    metric: judgemark
    lower_is_better: false
    render: true
    model_col: 0
    score_col: 1
    aliases:
      deepseek-v4-pro: deepseek/deepseek-v4-pro
    scores:
      deepseek/deepseek-v4-pro: 1.0
  mteb:
    source_url: https://huggingface.co/spaces/mteb/leaderboard
    metric: mteb_rank
    lower_is_better: false
    render: true
    model_col: 0
    score_col: 1
    aliases:
      qwen3-embedding-8b: qwen/qwen3-embedding-8b
    scores:
      qwen/qwen3-embedding-8b: 1.0

# Per-role selection: read the role's primary board, pick the top-ranked roster
# model. judge carries a cross-family constraint (must differ in provider family
# from the writer to avoid self-preference bias).
roles:
  model:
    board: llm_stats_composite
    config_key: model
  research:
    board: hhem
    config_key: research_model
  fuse:
    board: llm_stats_reasoning
    config_key: fuse_model
  write:
    board: eqbench_cw
    config_key: write_model
  edit:
    board: eqbench_cw
    config_key: edit_model
  judge:
    board: judgemark
    config_key: judge_model
    cross_family_with: write
  embedding:
    board: mteb
    config_key: embedding_model
