egun advertising it as the more waterproof IP67, a discrepancy Northwind has not yet addressed.\n\nPerhaps the most significant unknown lies in the camera’s gaze. While its license-plate recognition model hums along at 12 frames per second, its accuracy has only been proven on Latin scripts. Its performance on Cyrillic, Arabic, or Han characters remains an unverified question mark—a considerable caveat for a product born in Estonia but destined for a global market.\n\n**The Price of Perception**\n\nNorthwind is betting these capabilities are worth a premium. The base Halcyon unit retails for $349, with a “Pro” tier offering cloud synchronization for $499. For large-scale deployments, enterprise pricing begins at $12,000 for a twenty-five-unit bundle, all backed by a confident 36-month warranty. The value proposition hinges on the camera’s dense integration of sensors and silicon, a complexity mirrored in the upcoming thermal-imaging variant slated for Q1 2025. The price for that model, which will see heat as well as light, is still being calculated.\n\nIn the end, Project Halcyon is more than a list of specs and milestones. It is a tangible attempt to condense the chaotic stream of the world into structured, actionable data at the very point of capture. It is a device that promises calm analysis from a tiny, weatherproof box, even as its own story is still being written—marked by impressive benchmarks, ambitious roadmaps, and a few stubborn, overheated uncertainties. The team chose the name for a mythic peace, but building it requires navigating the very real friction between the ideal and the achievable.", "words": 771}]</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function(){
  var drafts = JSON.parse(document.getElementById('data').textContent);
  var LS = function(s){ return 'digest-review:' + s; };
  var SEL = 'digest-review:__selected';
  var md = function(t){ return (window.marked && window.marked.parse) ? window.marked.parse(t) : null; };
  var side = document.getElementById('side');
  var elModel = document.getElementById('model');
  var elMeta = document.getElementById('meta');
  var elArticle = document.getElementById('article');
  var elComment = document.getElementById('comment');
  var elCommentLabel = document.getElementById('commentLabel');
  var elCount = document.getElementById('count');
  var items = {};
  var active = -1;

  drafts.forEach(function(d, i){
    var b = document.createElement('button');
    b.className = 'item';
    b.innerHTML = '<span class="dot"></span><span class="name"></span><span class="w"></span>';
    b.querySelector('.name').textContent = d.slug;
    b.querySelector('.w').textContent = d.words + 'w';
    b.addEventListener('click', function(){ select(i); });
    side.appendChild(b);
    items[i] = b;
    markItem(i);
  });

  function commentVal(i){ return (localStorage.getItem(LS(drafts[i].slug)) || ''); }
  function markItem(i){
    var b = items[i]; if(!b) return;
    if (commentVal(i).trim()) b.classList.add('commented'); else b.classList.remove('commented');
  }
  function commentedCount(){
    var n = 0;
    drafts.forEach(function(d){ if((localStorage.getItem(LS(d.slug))||'').trim()) n++; });
    return n;
  }
  function updateCount(){ elCount.textContent = commentedCount() + ' / ' + drafts.length + ' commented'; }

  function select(i){
    if (i < 0 || i >= drafts.length) return;
    if (active >= 0 && items[active]) items[active].classList.remove('active');
    active = i;
    var d = drafts[i];
    items[i].classList.add('active');
    items[i].scrollIntoView({ block:'nearest' });
    elModel.textContent = d.slug;
    elMeta.textContent = d.words + ' words · ' + (i+1) + '/' + drafts.length;
    var html = md(d.text);
    if (html != null) { elArticle.innerHTML = html; }
    else { elArticle.textContent = ''; var pre = document.createElement('pre'); pre.textContent = d.text; elArticle.appendChild(pre); }
    elArticle.parentElement.scrollTop = 0;
    elCommentLabel.textContent = 'Your comments on ' + d.slug;
    elComment.value = commentVal(i);
    localStorage.setItem(SEL, d.slug);
  }

  elComment.addEventListener('input', function(){
    if (active < 0) return;
    localStorage.setItem(LS(drafts[active].slug), elComment.value);
    markItem(active); updateCount();
  });

  document.getElementById('prevBtn').addEventListener('click', function(){ select(active - 1); });
  document.getElementById('nextBtn').addEventListener('click', function(){ select(active + 1); });
  document.addEventListener('keydown', function(e){
    if (e.target === elComment || e.target.id === 'fallback') return;
    if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); select(Math.min(active+1, drafts.length-1)); }
    else if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); select(Math.max(active-1, 0)); }
  });

  function exportText(){
    var parts = [];
    drafts.forEach(function(d){
      var v = (localStorage.getItem(LS(d.slug)) || '').trim();
      if (v) parts.push('## ' + d.slug + '\n' + v);
    });
    return parts.length ? '# Digest review comments (write.md bake-off)\n\n' + parts.join('\n\n') + '\n' : '';
  }
  document.getElementById('copyBtn').addEventListener('click', function(){
    var text = exportText();
    if (!text) { flash('No comments yet'); return; }
    var n = commentedCount();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ flash('Copied ' + n + ' comments'); }, function(){ showFallback(text); });
    } else { showFallback(text); }
  });
  document.getElementById('clearBtn').addEventListener('click', function(){
    if (!confirm('Clear ALL your comments? This cannot be undone.')) return;
    drafts.forEach(function(d, i){ localStorage.removeItem(LS(d.slug)); markItem(i); });
    if (active >= 0) elComment.value = '';
    updateCount();
  });
  function flash(msg){ var prev = elCount.textContent; elCount.textContent = msg; setTimeout(updateCount, 1600); }
  function showFallback(text){
    var t = document.getElementById('fallback');
    t.value = text; t.style.display = 'block'; t.focus(); t.select();
    flash('Clipboard blocked — text selected, Cmd-C');
    t.addEventListener('blur', function(){ t.style.display = 'none'; }, { once:true });
  }

  updateCount();
  var lastSlug = localStorage.getItem(SEL);
  var startIdx = 0;
  if (lastSlug) { for (var k=0;k<drafts.length;k++){ if (drafts[k].slug === lastSlug){ startIdx = k; break; } } }
  select(startIdx);
})();
</script>
</body>
</html>
